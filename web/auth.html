<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - B5</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f7f7f9; }
    .login-box {
      background: white; padding: 30px; border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.2); text-align: center; width: 300px;
    }
    .login-box h1 { margin-bottom: 20px; color: #d62828; }
    .login-box input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    .login-box button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #d62828; color: white; font-size: 18px; cursor: pointer; transition: 0.3s; }
    .login-box button:hover { background: #b71c1c; }
    .error { color: red; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>تسجيل الدخول</h1>
    <div class="error" id="errorMsg">كلمة السر غير صحيحة!</div>
    <input type="password" id="password" placeholder="أدخل كلمة السر">
    <button id="loginBtn">دخول</button>
  </div>

  <script>
    // كلمة السر (تقدر تغيرها هنا)
    const correctPassword = "1234";

    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    loginBtn.addEventListener("click", () => {
      const pwd = document.getElementById("password").value;
      if(pwd === correctPassword){
        // حفظ حالة تسجيل الدخول في الجلسة
        sessionStorage.setItem("auth", "true");

        // إعادة التوجيه للصفحة المطلوبة بعد تسجيل الدخول
        const params = new URLSearchParams(window.location.search);
        const to = params.get("to") || "index.html"; // صفحة افتراضية إذا لم يحدد شيء
        window.location.href = to;
      } else {
        errorMsg.style.display = "block";
      }
    });

    // الضغط على Enter للدخول
    document.getElementById("password").addEventListener("keypress", (e)=>{
      if(e.key === "Enter") loginBtn.click();
    });
  </script>
</body>
</html>
