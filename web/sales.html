<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المبيعات - B5</title>
  <link rel="stylesheet" href="style.css">

  <script>
    
  // التحقق من تسجيل الدخول
  if (!sessionStorage.getItem("auth")) {
    window.location.href = `auth.html?to=${window.location.pathname.split('/').pop()}`;
  }


  </script>
</head>
<body>
  <header>
    <h1>💰 سجل المبيعات</h1>
  </header>

  <main>
    <section>
      <h2>فواتير اليوم</h2>
      <table>
        <thead>
          <tr>
            <th>رقم الفاتورة</th>
            <th>التاريخ</th>
            <th>الإجمالي</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>---</td>
            <td>---</td>
            <td>---</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
  <script>
    fetch("http://localhost:3000/api/sales")
      .then(res => res.json())
      .then(data => {
        const tbody = document.querySelector("tbody");
        tbody.innerHTML = ""; // مسح السطر الافتراضي
        data.forEach(sale => {
  const row = document.createElement("tr");
  row.innerHTML = `
    <td>${sale.id}</td>
    <td>${sale.sale_date}</td>
    <td>${sale.total} جنيه</td>
  `;
  tbody.appendChild(row);
});

      })
      .catch(err => console.error("خطأ في جلب المبيعات:", err));
    </script>
    
</body>
</html>
