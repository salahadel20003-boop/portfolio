<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إضافة صنف - B5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>➕ إضافة صنف جديد</h1>
  </header>

  <main>
    <form id="addForm">
      <label>اسم الصنف:</label>
      <input id="name" type="text" placeholder="ادخل اسم الصنف" required>
  
      <label>السعر:</label>
      <input id="price" type="number" placeholder="ادخل السعر" required>
  
      <label>الكمية:</label>
      <input id="quantity" type="number" value="0" min="0">
  
      <label>القسم:</label>
      <select id="category">
        <option value="1">الكريبات</option>
        <option value="2">السوري</option>
        <option value="3">البرجر</option>
        <option value="4">الوجبات</option>
        <option value="5">الإضافات</option>
      </select>
      
      <button type="submit">حفظ الصنف</button>
    </form>
  
    <!-- الأزرار الجديدة -->
    <div class="actions">
      <select id="editSelect" class="form-select">
        <option value="">اختر الصنف للتعديل</option>
      </select>
      
      <button id="editBtn">تعديل الصنف</button>
      <button id="deleteBtn">حذف الصنف</button>
      <button id="newReportBtn">بيان جديد</button>
      <button id="logoutBtn">الخروج</button>
    </div>
  </main>
  
  <script>
    // إضافة صنف جديد
    document.getElementById("addForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const quantity = document.getElementById("quantity").value;
      const category_id = document.getElementById("category").value;
  
      const res = await fetch("/api/products", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, stock: quantity, category_id })
      });
  
      const data = await res.json();
      alert(data.message || "تم الإضافة");
    });
  
  // جلب الأصناف وملء القائمة المنسدلة
  async function loadProductsForEdit() {
  const res = await fetch("/api/products");
  const products = await res.json();

  // ✅ نجيب العنصر بدل ما ننشئ واحد جديد كل مرة
  const select = document.getElementById("editSelect");

  // 💥 ننظف القائمة القديمة قبل ما نضيف الجديدة
  select.innerHTML = "";

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = "اختر الصنف للتعديل";
  select.appendChild(defaultOption);

  products.forEach(p => {
    const option = document.createElement("option");
    option.value = p.id;
    option.textContent = p.name;
    select.appendChild(option);
  });

  // 🧠 نحدّث القيم في الفورم لما المستخدم يختار صنف
  select.addEventListener("change", (e) => {
    const selected = products.find(p => p.id == e.target.value);
    if (selected) {
      document.getElementById("name").value = selected.name;
      document.getElementById("price").value = selected.price;
      document.getElementById("quantity").value = selected.quantity; // ← لو العمود اسمه stock غيّرها
      document.getElementById("category").value = selected.category_id;
    }
  });
}



// تعديل الصنف من الفورم
document.getElementById("editBtn").addEventListener("click", async () => {
  const select = document.getElementById("editSelect");
  const id = select?.value;

  if (!id) return alert("⚠️ اختر الصنف الذي تريد تعديله أولاً");

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value;
  const stock = document.getElementById("quantity").value;
  const category_id = document.getElementById("category").value;

  try {
    const res = await fetch(`/api/products/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, price, stock, category_id })
    });

    const data = await res.json();
    alert(data.message || "✅ تم تعديل الصنف بنجاح");

    // تحديث الواجهة
    await loadProductsForEdit();
    window.dispatchEvent(new Event("productsUpdated"));
  } catch (err) {
    console.error(err);
    alert("❌ حدث خطأ أثناء تعديل الصنف");
  }
});



// تحميل القائمة عند فتح الصفحة
loadProductsForEdit();

  
   // حذف الصنف
document.getElementById("deleteBtn").addEventListener("click", async () => {
  const select = document.getElementById("editSelect");
  const id = select?.value;
  const name = select?.options[select.selectedIndex]?.text;

  if (!id) return alert("⚠️ اختر الصنف الذي تريد حذفه أولاً");

  if (!confirm(`هل أنت متأكد من حذف "${name}"؟`)) return;

  const res = await fetch(`/api/products/${id}`, { method: "DELETE" });
  const data = await res.json();

  if (data.error) alert(data.error);
  else alert(data.message || "✅ تم حذف الصنف بنجاح");
  window.dispatchEvent(new Event("productsUpdated"));


  // تحديث القائمة بعد الحذف
  loadProductsForEdit();
});

  
    // بيان جديد (مثال: فتح صفحة جديدة للبيانات)
    document.getElementById("newReportBtn").addEventListener("click", () => {
      window.location.href = "/report.html"; // ممكن تعدل الرابط حسب مشروعك
    });
  
    // الخروج
    document.getElementById("logoutBtn").addEventListener("click", () => {
      window.location.href = "/logout"; // رابط الخروج
    });
  </script>
  

</html>
