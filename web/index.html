<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام الكاشير - B5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>نظام الكاشير - B5</h1>
  </header>

  <main>
    <!-- الأزرار الجانبية -->
    <div class="categories">
      <button data-cat="1">الكريبات</button>
<button data-cat="2">السوري</button>
<button data-cat="3">البرجر</button>
<button data-cat="4">الوجبات</button>
<button data-cat="5">الإضافات</button>


      <button data-cat="add-item">➕ إضافة صنف</button>
      <button data-cat="purchases">📦 المشتريات</button>
      <button data-cat="sales">💰 المبيعات</button>
      <button data-cat="profit">📈 الأرباح</button>
      <button data-cat="exit">🚪 خروج</button>
    </div>

    <!-- قائمة المنتجات -->
    <section id="products" class="products">
      <p>اختر قسم من القائمة الجانبية لعرض المنتجات.</p>
    </section>

    <!-- الفاتورة -->
    <aside class="bill">
      <h2>الفاتورة</h2>
      <div id="bill-items"></div>
      <p>الإجمالي: <span id="total">0</span> جنيه</p>

      <div class="payment">
        <label>رقم الموبايل (الدليفري):</label>
        <input type="text" id="phone" placeholder="01xxxxxxxxx">

        <label>عنوان العميل (الدليفري):</label>
        <input type="text" id="address" placeholder="الحي - الشارع - رقم العمارة">
       
        <label>ملاحظات:</label>
        <textarea id="notes" placeholder="مثلاً: بدون بصل - زيادة صوص - توصيل سريع"></textarea>
       
        <label>المدفوع:</label>
        <input type="number" id="paid" placeholder="0">
        <p>الباقي: <span id="change">0</span> جنيه</p>
      </div>

      <button id="pay">💵 دفع</button>
      <button id="print">🖨️ طباعة</button>

      <!-- الوقت والتاريخ -->
      <div id="datetime" class="datetime">
        <p>--/--/---- --:--:--</p>
      </div>
    </aside>
  </main>

  <!-- سكريبت التطبيق -->
  <script src="script.js"></script>
</body>
</html>
